# Builds property_metrics.json from HTTPS CSV URLs and commits data/property/property_metrics.json.
# Set Vercel PROPERTY_METRICS_JSON_URL to the raw GitHub URL for that file (fast dashboard loads).
#
# Required repo secrets:
#   PROPERTY_SALES_CSV_URL      — HTTPS URL to sales transactions CSV
# Optional:
#   PROPERTY_RENTAL_CSV_URL     — HTTPS URL to rental transactions CSV
#   PROPERTY_LISTINGS_CSV_URL   — HTTPS URL to rental listings CSV
#   PROPERTY_SALES_LISTINGS_CSV_URL — HTTPS URL to sales listings CSV
#
# Optional: from your CSV data repo, trigger this repo via repository_dispatch (event type property_csv_updated)
# using a PAT with repo scope on this repository.

name: Property metrics snapshot

on:
  schedule:
    - cron: '0 5 * * *' # 05:00 UTC daily
  workflow_dispatch:
  repository_dispatch:
    types: [property_csv_updated]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm ci

      - name: Build property_metrics.json
        env:
          PROPERTY_SALES_CSV_URL: ${{ secrets.PROPERTY_SALES_CSV_URL }}
          PROPERTY_RENTAL_CSV_URL: ${{ secrets.PROPERTY_RENTAL_CSV_URL }}
          PROPERTY_LISTINGS_CSV_URL: ${{ secrets.PROPERTY_LISTINGS_CSV_URL }}
          PROPERTY_SALES_LISTINGS_CSV_URL: ${{ secrets.PROPERTY_SALES_LISTINGS_CSV_URL }}
        run: |
          mkdir -p data/property
          node scripts/build-property-snapshot.mjs > data/property/property_metrics.json
          test -s data/property/property_metrics.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/property/property_metrics.json
          if git diff --staged --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "chore(data): refresh property_metrics.json [skip ci]"
            git push
          fi
